    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading-screen">
    <div class="loading-content">
        <div class="logo-wrapper">
            <img src="profile.png" class="loading-logo" alt="Profile">
            <div class="ring"></div>
        </div>
    </div>
</div>

<main class="container">
    <img src="profile.png" class="profile" alt="Profile Whoisdanz">
    <h1>Whoisdanz</h1>
    <p>Official Links & Support</p>

    <nav class="links">
        <a href="https://www.tiktok.com/@whoisdanz12" target="_blank" rel="noopener noreferrer">TikTok</a>

    <div class="qr-box">
        <span class="close" id="closeQR">&times;</span>

        <div class="qr-title">QR Donasi</div>

        <div class="qr-selector">
            <button class="qr-option active" data-qr="1">QR 1</button>
            <button class="qr-option" data-qr="2">QR 2</button>
        </div>

        <div class="qr-slider">
            <img src="QR-Donasi-Whoisdanz.png" class="qr-preview active" data-qr="1">
            <img src="QR-Donasi2-Whoisdanz.png" class="qr-preview" data-qr="2">
        </div>

        <a id="downloadQR" href="QR-Donasi-Whoisdanz.png" download class="download-btn">
            Download QR
        </a>
    </div>
</div>

<audio id="bg-music" preload="metadata" loop></audio>

<footer class="footer">
    <a href="https://github.com/whoisdanz12" target="_blank" rel="noopener noreferrer" class="footer-link">
